run_id: default_run
output_root: outputs/runs

dataset:
  # Supported file types for dataset.path:
  # - CSV:  data/raw/dataset.csv
  # - JSON: data/raw/dataset.json
  #   * list form:   [{"sample_id":"...","source":"...","license":"..."}]
  #   * wrapped form:{"data":[{"sample_id":"...","source":"...","license":"..."}]}
  # Missing sample_id/source/license are auto-filled:
  # sample_id=sample-{row_index}, source=unknown, license=unknown
  path: data/raw/alpaca_data.json
  subset_size: 3000

split:
  seed: 2026
  ratios:
    train: 0.8
    test: 0.1
    shadow: 0.1
  stratify_by:
    - source
    - license
