run_id: final_report_run
output_root: outputs/runs
model_name_or_path: llama3.2:3b
seed: 2026
top_k: 50
train_subset_size: 600
project_name: dataset_attribution

# Optional split-path overrides for mixed-run setups.
# Leave unset/null to use output_root/run_id/splits/{train,test}.csv.
train_manifest_path: outputs/runs/default_run/splits/train.csv
test_manifest_path: outputs/runs/default_run/splits/test.csv
shadow_manifest_path: outputs/runs/default_run/splits/shadow.csv

influence:
  mode: ihvp
  ihvp:
    damping: 0.01
    scale: 25.0
    recursion_depth: 256
    num_samples: 1

lora:
  lora_only: true
  adapter_path: outputs/runs/final_report_run/train/adapter

logix:
  # Compatibility expectations by installed `logix-ai` version:
  # - 0.1.1 (legacy path): keep `setup` and `run` blocks present (can be `{}`),
  #   and rely on module-level APIs (`log/get_log/add_analysis/finalize`).
  # - newer versions (modern path): `setup`/`run` remain accepted pass-through keys,
  #   while execution may use modern context/execute APIs under engine shims.
  # Project resolution is version-agnostic: top-level `project_name` is preferred,
  # with `logix.project` as backward-compatible fallback.
  # Optional (recommended for Colab / mixed-run CWDs):
  # init_config_path: configs/logix_init.yaml
  # Alias also accepted: `config_path`.
  project: dataset_attribution
  setup: {}
  run: {}
